<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezoomind Autofill</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
    }

    .header {
      background: linear-gradient(135deg, #10b981, #059669);
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .content {
      padding: 20px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #1a1a2e;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
    }

    .status-dot.disconnected {
      background: #ef4444;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #10b981;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-secondary {
      background: #2d2d44;
      color: #e2e8f0;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #3d3d54;
    }

    .error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    .profile-info {
      font-size: 13px;
      color: #94a3b8;
    }

    .profile-info strong {
      color: #e2e8f0;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 Rezoomind</h1>
    <p>Resume Autofill Extension</p>
  </div>

  <div class="content">
    <!-- Status -->
    <div class="status" id="status">
      <div class="status-dot disconnected" id="statusDot"></div>
      <span id="statusText">Not connected</span>
    </div>

    <!-- Login Form -->
    <div id="loginSection">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" id="loginBtn">Connect Account</button>
      <p class="error" id="error"></p>
    </div>

    <!-- Connected Profile -->
    <div id="profileSection" class="hidden">
      <div class="profile-info">
        <p>Profile loaded and ready to autofill.</p>
        <p style="margin-top: 8px;">Navigate to a job application page and click the <strong>Rezoomind Autofill</strong> button to fill in your details.</p>
      </div>
      <button class="btn btn-secondary" id="logoutBtn">Disconnect</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
